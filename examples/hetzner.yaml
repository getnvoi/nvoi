# Hetzner cluster + Cloudflare DNS + R2 storage.
# Single-node deploy of a Rails-style web service that pushes built
# images to Docker Hub.
#
# Required env vars:
#   HETZNER_TOKEN                       (providers.infra)
#   CF_API_KEY / CF_ZONE_ID / DNS_ZONE  (providers.dns)
#   CF_API_KEY / CF_ACCOUNT_ID          (providers.storage; reuses CF_API_KEY)
#   DOCKERHUB_USERNAME / DOCKERHUB_TOKEN (registry — push target for build:)
#   RAILS_MASTER_KEY                    (service secret)
#
# SSH key: nvoi reads $SSH_PRIVATE_KEY, falls back to $SSH_KEY_PATH,
# then ~/.ssh/id_ed25519, then ~/.ssh/id_rsa.

app: dummy-rails
env: production

providers:
  infra: hetzner
  dns: cloudflare
  storage: cloudflare

servers:
  master:
    type: cax11
    region: nbg1
    role: master

firewall: default

secrets:
  - RAILS_MASTER_KEY

storage:
  assets:
    cors: true

registry:
  docker.io:
    username: $DOCKERHUB_USERNAME
    password: $DOCKERHUB_TOKEN

services:
  web:
    image: benbonnet/dummy-rails  # repo-only — host inferred from registry: (one entry)
    build: ./                     # build context = repo root, Dockerfile = ./Dockerfile
    port: 80
    health: /up
    env: [RAILS_ENV=production]
    secrets: [RAILS_MASTER_KEY]
    storage: [assets]

domains:
  web: [hz.nvoi.to]
