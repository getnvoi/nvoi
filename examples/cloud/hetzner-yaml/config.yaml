# Hetzner deploy config — YAML push approach.
# Alternative to the imperative CLI commands in examples/cloud/hetzner/.
servers:
  master:
    type: cx23
    region: fsn1
  worker-1:
    type: cx33
    region: fsn1

firewall: cloudflare

build:
  web:
    source: benbonnet/dummy-rails

storage:
  assets:
    cors: true

ingress:
  cloudflare-managed: true

services:
  db:
    managed: postgres
  web:
    image: web
    port: 80
    replicas: 2
    health: /up
    server: worker-1
    env:
      - RAILS_ENV=production
      - POSTGRES_HOST=db
    secrets:
      - POSTGRES_PASSWORD
      - POSTGRES_USER
      - POSTGRES_DB
      - RAILS_MASTER_KEY
    storage:
      - assets
  jobs:
    image: web
    command: bin/jobs
    server: worker-1
    env:
      - RAILS_ENV=production
      - POSTGRES_HOST=db
    secrets:
      - POSTGRES_PASSWORD
      - POSTGRES_USER
      - POSTGRES_DB
      - RAILS_MASTER_KEY

domains:
  web: hz-yaml.nvoi.to
