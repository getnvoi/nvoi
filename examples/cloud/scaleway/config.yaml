# Scaleway deploy config — equivalent to examples/core/scaleway/deploy
servers:
  master:
    type: DEV1-L
    region: fr-par-1

build:
  web:
    source: benbonnet/dummy-rails

storage:
  assets:
    cors: true

services:
  db:
    managed: postgres
  web:
    build: web
    port: 80
    replicas: 2
    health: /up
    env:
      - RAILS_ENV=production
    secrets:
      - RAILS_MASTER_KEY
      - POSTGRES_HOST=DATABASE_DB_HOST
      - POSTGRES_USER=DATABASE_DB_USER
      - POSTGRES_DB=DATABASE_DB_DATABASE
      - POSTGRES_PASSWORD=DATABASE_DB_PASSWORD
    storage:
      - assets
    uses: [db]
  jobs:
    build: web
    command: bin/jobs
    env:
      - RAILS_ENV=production
    secrets:
      - RAILS_MASTER_KEY
      - POSTGRES_HOST=DATABASE_DB_HOST
      - POSTGRES_USER=DATABASE_DB_USER
      - POSTGRES_DB=DATABASE_DB_DATABASE
      - POSTGRES_PASSWORD=DATABASE_DB_PASSWORD
    uses: [db]

domains:
  web: scw-cloud.nvoi.to
