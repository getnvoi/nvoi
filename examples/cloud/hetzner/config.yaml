# Hetzner deploy config — equivalent to examples/core/hetzner/deploy
servers:
  master:
    type: cx23
    region: fsn1
  worker-1:
    type: cx33
    region: fsn1

firewall: cloudflare

build:
  web:
    source: benbonnet/dummy-rails

storage:
  assets:
    cors: true

services:
  db:
    managed: postgres
  meilisearch:
    managed: meilisearch
  web:
    build: web
    port: 80
    replicas: 2
    health: /up
    server: worker-1
    env:
      - RAILS_ENV=production
    secrets:
      - RAILS_MASTER_KEY
      - POSTGRES_HOST=DATABASE_DB_HOST
      - POSTGRES_USER=DATABASE_DB_USER
      - POSTGRES_DB=DATABASE_DB_NAME
      - POSTGRES_PASSWORD=DATABASE_DB_PASSWORD
    storage:
      - assets
    uses: [db]
  jobs:
    build: web
    command: bin/jobs
    server: worker-1
    env:
      - RAILS_ENV=production
    secrets:
      - RAILS_MASTER_KEY
      - POSTGRES_HOST=DATABASE_DB_HOST
      - POSTGRES_USER=DATABASE_DB_USER
      - POSTGRES_DB=DATABASE_DB_NAME
      - POSTGRES_PASSWORD=DATABASE_DB_PASSWORD
    uses: [db]

domains:
  web:
    domains: [hz-cloud.nvoi.to]
    proxy: true
