# Hetzner deploy config — equivalent to examples/core/hetzner/deploy
servers:
  master:
    type: cx23
    region: fsn1
  worker-1:
    type: cx33
    region: fsn1

build:
  web:
    source: benbonnet/dummy-rails

storage:
  assets:
    cors: true

services:
  db:
    managed: postgres
  meilisearch:
    managed: meilisearch
  web:
    build: web
    port: 80
    replicas: 2
    health: /up
    server: worker-1
    env:
      - RAILS_ENV=production
    secrets:
      - RAILS_MASTER_KEY
    storage:
      - assets
    uses: [db]
  jobs:
    build: web
    command: bin/jobs
    server: worker-1
    env:
      - RAILS_ENV=production
    secrets:
      - RAILS_MASTER_KEY
    uses: [db]

domains:
  web: hz-cloud.nvoi.to
