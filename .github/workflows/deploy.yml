name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "cmd/api/**"
      - "cmd/distribution/**"
      - "internal/**"
      - "pkg/**"
      - "nvoi.yaml"
      - ".github/workflows/deploy.yml"

  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Write SSH key
        run: |
          umask 077
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy
        env:
          # Provider credentials (resolved by internal/core/resolve.go)
          HETZNER_TOKEN: ${{ secrets.HETZNER_TOKEN }}
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          DNS_ZONE: nvoi.to
          SSH_KEY_PATH: ~/.ssh/id_ed25519
          # Database credentials (database package reads {NAME}_POSTGRES_*)
          MAIN_POSTGRES_USER: ${{ secrets.MAIN_POSTGRES_USER }}
          MAIN_POSTGRES_PASSWORD: ${{ secrets.MAIN_POSTGRES_PASSWORD }}
          MAIN_POSTGRES_DB: ${{ secrets.MAIN_POSTGRES_DB }}
          BUGSINK_POSTGRES_USER: ${{ secrets.BUGSINK_POSTGRES_USER }}
          BUGSINK_POSTGRES_PASSWORD: ${{ secrets.BUGSINK_POSTGRES_PASSWORD }}
          BUGSINK_POSTGRES_DB: ${{ secrets.BUGSINK_POSTGRES_DB }}
          # App secrets
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          BUGSINK_SECRET_KEY: ${{ secrets.BUGSINK_SECRET_KEY }}
          BUGSINK_ADMIN_EMAIL: ${{ secrets.BUGSINK_ADMIN_EMAIL }}
          BUGSINK_ADMIN_PASSWORD: ${{ secrets.BUGSINK_ADMIN_PASSWORD }}
          BUGSINK_EMAIL_HOST_USER: ${{ secrets.BUGSINK_EMAIL_HOST_USER }}
          BUGSINK_EMAIL_HOST_PASSWORD: ${{ secrets.BUGSINK_EMAIL_HOST_PASSWORD }}
        run: |
          chmod +x ./bin/deploy
          ./bin/deploy
