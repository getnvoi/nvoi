name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "cmd/web/**"
      - "cmd/api/**"
      - "cmd/distribution/**"
      - "internal/**"
      - "pkg/**"
      - "nvoi.yaml"
      - ".github/workflows/deploy.yml"

  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Write SSH key
        run: |
          umask 077
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy
        env:
          # Provider credentials (resolved by internal/core/resolve.go)
          HETZNER_TOKEN: ${{ secrets.HETZNER_TOKEN }}
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          DNS_ZONE: nvoi.to
          SSH_KEY_PATH: ~/.ssh/id_ed25519
          # App secrets (resolved from env by reconcile at deploy time)
          POSTGRES_USER: ${{ secrets.NVOI_POSTGRES_USER }}
          POSTGRES_DB: ${{ secrets.NVOI_POSTGRES_DB }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          DATABASE_URL: "postgres://${{ secrets.NVOI_POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@db:5432/${{ secrets.NVOI_POSTGRES_DB }}"
        run: |
          chmod +x ./bin/deploy
          ./bin/deploy
