name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "pkg/**"
      - "nvoi.yaml"
      - ".github/workflows/deploy.yml"

  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Deploy
        env:
          # Infisical bootstrap — every credential (SSH key included) is fetched through the secrets provider
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          INFISICAL_PROJECT_SLUG: ${{ secrets.INFISICAL_PROJECT_SLUG }}
          INFISICAL_ENVIRONMENT: ${{ secrets.INFISICAL_ENVIRONMENT }}
        run: |
          chmod +x ./bin/deploy
          ./bin/deploy
