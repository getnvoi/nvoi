name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "cmd/web/**"
      - "cmd/api/**"
      - "cmd/distribution/**"
      - "internal/api/**"
      - "pkg/**"
      - "docker-compose.yml"
      - ".github/workflows/deploy.yml"

  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install nvoi
        run: go build -o /usr/local/bin/nvoi ./cmd/core

      - name: Write SSH key
        run: |
          umask 077
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy
        env:
          NVOI_APP_NAME: nvoi
          NVOI_ENV: prod
          COMPUTE_PROVIDER: hetzner
          HETZNER_TOKEN: ${{ secrets.HETZNER_TOKEN }}
          DNS_PROVIDER: cloudflare
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          DNS_ZONE: nvoi.to
          STORAGE_PROVIDER: cloudflare
          NVOI_BIN: nvoi
          SSH_KEY_PATH: ~/.ssh/id_ed25519
          NVOI_POSTGRES_USER: ${{ secrets.NVOI_POSTGRES_USER }}
          NVOI_POSTGRES_DB: ${{ secrets.NVOI_POSTGRES_DB }}
          NVOI_POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          NVOI_JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NVOI_ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          chmod +x ./bin/deploy
          ./bin/deploy
