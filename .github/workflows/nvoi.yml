# Managed by `nvoi ci init` — DO NOT EDIT BY HAND.
#
# This workflow runs on every push to the default branch and downloads
# a pinned nvoi binary to run `nvoi deploy` against the cluster described
# in `nvoi.yaml`.
#
# Secrets in the env: block below are managed by `nvoi ci init` and
# are synced from the operator's local environment at init time.
# Re-run `nvoi ci init` to rotate secrets or pick up new ones.

name: nvoi deploy

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: nvoi-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy (default branch only)
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install nvoi
        run: |
          set -euo pipefail
          curl -fsSL -o nvoi "https://cdn.nvoi.to/bin/latest/linux-amd64/nvoi"
          chmod +x nvoi
          sudo mv nvoi /usr/local/bin/nvoi
          nvoi --version

      - name: nvoi deploy
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          DNS_ZONE: ${{ secrets.DNS_ZONE }}
          DOCKER_REGISTRY_PASSWORD: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
          DOCKER_REGISTRY_USER: ${{ secrets.DOCKER_REGISTRY_USER }}
          HETZNER_TOKEN: ${{ secrets.HETZNER_TOKEN }}
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          INFISICAL_ENVIRONMENT: ${{ secrets.INFISICAL_ENVIRONMENT }}
          INFISICAL_PROJECT_SLUG: ${{ secrets.INFISICAL_PROJECT_SLUG }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: nvoi deploy --ci
