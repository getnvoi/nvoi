name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # No `test` job here on purpose. ci.yml runs fmt + vet + test on every
  # push and PR, so by the time a tag is pushed the test suite has
  # already passed against the exact commit the tag points at. Re-running
  # the suite at release time added ~3 min with zero additional guarantee
  # (it'd only catch a race between ci.yml running and the tag getting
  # cut — which requires a human to tag an un-CI'd SHA, and we don't).

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""; [ "$GOOS" = "windows" ] && ext=".exe"
          go build -ldflags="-s -w" -o "dist/nvoi-${GOOS}-${GOARCH}${ext}" ./cmd/cli
      - uses: actions/upload-artifact@v4
        with:
          name: nvoi-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: dist/, merge-multiple: true }
      - name: GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Deploy distribution
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: ./worker/deploy.sh release "${{ github.ref_name }}" dist
