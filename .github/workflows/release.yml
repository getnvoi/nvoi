name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # No `test` job here on purpose. ci.yml runs fmt + vet + test on every
  # push and PR, so by the time a tag is pushed the test suite has
  # already passed against the exact commit the tag points at. Re-running
  # the suite at release time added ~3 min with zero additional guarantee
  # (it'd only catch a race between ci.yml running and the tag getting
  # cut — which requires a human to tag an un-CI'd SHA, and we don't).

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version-file: go.mod }
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""; [ "$GOOS" = "windows" ] && ext=".exe"
          # Bake the version so the CLI knows which docker.io/nvoi/db
          # tag to reference. The image workflow below publishes the
          # matching tag — keeping binary and image version in lockstep
          # is the same discipline we apply to user workloads
          # (deploy-hash tags).
          go build \
            -ldflags="-s -w -X github.com/getnvoi/nvoi/pkg/provider.DBImageTag=${{ github.ref_name }}" \
            -o "dist/nvoi-${GOOS}-${GOARCH}${ext}" ./cmd/cli
      - uses: actions/upload-artifact@v4
        with:
          name: nvoi-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { path: dist/, merge-multiple: true }
      - name: GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Deploy distribution
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: ./worker/deploy.sh release "${{ github.ref_name }}" dist

  # docker.io/nvoi/db — the uniform database backup + restore runner
  # every DatabaseProvider's CronJob / one-shot Job invokes. Tag
  # must match the CLI binary (both baked with -X pkg/utils.DBImageTag=<tag>),
  # so this job only runs on tags and the tag is the version.
  db-image:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push nvoi/db
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cmd/db/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            NVOI_VERSION=${{ github.ref_name }}
          # Two tags: exact version (what the CLI pins) and `latest`
          # (ops can watch with `docker pull nvoi/db:latest` when
          # debugging). The CLI only references the exact version.
          tags: |
            docker.io/nvoi/db:${{ github.ref_name }}
            docker.io/nvoi/db:latest
          push: true
