name: Destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DESTROY to confirm production teardown'
        required: true
        type: string

concurrency:
  group: destroy
  cancel-in-progress: false

jobs:
  destroy:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Confirm destroy
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DESTROY" ]; then
            echo "Refusing destroy: confirmation input must be DESTROY"
            exit 1
          fi

      - name: Install nvoi
        run: go build -o /usr/local/bin/nvoi ./cmd/core

      - name: Write SSH key
        run: |
          umask 077
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Destroy
        env:
          NVOI_APP_NAME: nvoi
          NVOI_ENV: prod
          COMPUTE_PROVIDER: hetzner
          HETZNER_TOKEN: ${{ secrets.HETZNER_TOKEN }}
          DNS_PROVIDER: cloudflare
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          DNS_ZONE: nvoi.to
          STORAGE_PROVIDER: cloudflare
          SSH_KEY_PATH: ~/.ssh/id_ed25519
        run: |
          # Ingress first: service delete and dns delete are now guarded.
          nvoi ingress delete -y

          # DNS
          nvoi dns delete web nvoi.to www.nvoi.to -y
          nvoi dns delete api api.nvoi.to -y
          nvoi dns delete distribution get.nvoi.to -y

          # Storage content before bucket deletion
          nvoi storage empty releases -y

          # Secrets
          nvoi secret delete DATABASE_URL
          nvoi secret delete ENCRYPTION_KEY
          nvoi secret delete JWT_SECRET
          nvoi secret delete POSTGRES_PASSWORD

          # Services
          nvoi service delete distribution -y
          nvoi service delete web -y
          nvoi service delete api -y
          nvoi service delete db -y

          # Storage resource
          nvoi storage delete releases -y

          # Volumes and compute
          nvoi volume delete pgdata -y
          nvoi instance delete master -y
