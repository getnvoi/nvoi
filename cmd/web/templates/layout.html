{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.title}} — nvoi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="{{.css}}">
  <link rel="stylesheet" href="/static/css/syntax.css">
</head>
<body class="bg-white text-gray-900 min-h-screen flex flex-col">
  <nav class="border-b border-gray-200">
    <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-8">
        <a href="/" class="text-xl font-bold tracking-tight">nvoi</a>
        <div class="hidden md:flex items-center gap-1 text-sm">
          <a href="https://docs.nvoi.to" class="px-3 py-2 rounded-md text-gray-600 hover:bg-gray-50 hover:text-gray-900">Docs</a>
          <a href="/blog" class="px-3 py-2 rounded-md text-gray-600 hover:bg-gray-50 hover:text-gray-900">Blog</a>
        </div>
      </div>
      <div class="hidden md:flex items-center gap-4 text-sm">
        <a href="https://github.com/getnvoi/nvoi" class="text-gray-500 hover:text-gray-900">GitHub</a>
      </div>
      <button class="md:hidden p-2" onclick="document.getElementById('mobile-nav').classList.toggle('hidden')">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
    <div id="mobile-nav" class="hidden md:hidden border-t border-gray-200 bg-white">
      <div class="px-6 py-4 space-y-3 text-sm">
        <a href="https://docs.nvoi.to" class="block text-gray-600 hover:text-gray-900">Docs</a>
        <a href="/blog" class="block text-gray-600 hover:text-gray-900">Blog</a>
        <a href="https://github.com/getnvoi/nvoi" class="block text-gray-600 hover:text-gray-900">GitHub</a>
      </div>
    </div>
  </nav>
  <main class="flex-1">
    {{template "content" .}}
  </main>
  <footer class="border-t border-gray-200 mt-auto">
    <div class="max-w-6xl mx-auto px-6 py-8 flex flex-col sm:flex-row items-center justify-between gap-4 text-sm text-gray-400">
      <span>nvoi</span>
      <div class="flex flex-wrap justify-center gap-6">
        <a href="https://docs.nvoi.to" class="hover:text-gray-600">Docs</a>
        <a href="/blog" class="hover:text-gray-600">Blog</a>
        <a href="/privacy" class="hover:text-gray-600">Privacy</a>
        <a href="/terms" class="hover:text-gray-600">Terms</a>
        <a href="/contact" class="hover:text-gray-600">Contact</a>
        <a href="https://github.com/getnvoi/nvoi" class="hover:text-gray-600">GitHub</a>
      </div>
    </div>
  </footer>
</body>
</html>
{{end}}
