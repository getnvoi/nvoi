{{define "content"}}
<div class="max-w-4xl mx-auto px-6 py-16">
  <h1 class="text-4xl font-bold mb-12">Blog</h1>
  {{if .posts}}
  <div class="space-y-8">
    {{range .posts}}
    <a href="/blog/{{.Slug}}" class="block group">
      <article class="border-b border-gray-100 pb-8">
        <h2 class="text-xl font-semibold group-hover:text-gray-600 mb-2">{{.Meta.Title}}</h2>
        {{if .Meta.Description}}<p class="text-gray-500 mb-2">{{.Meta.Description}}</p>{{end}}
        {{if .Meta.Date}}<time class="text-sm text-gray-400">{{formatDate .Meta.Date}}</time>{{end}}
      </article>
    </a>
    {{end}}
  </div>
  {{else}}
  <p class="text-gray-500">No posts yet.</p>
  {{end}}
</div>
{{end}}

{{template "layout" .}}
