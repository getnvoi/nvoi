{{define "content"}}
<!-- Hero -->
<div class="py-24 text-center">
  <div class="max-w-3xl mx-auto px-6">
    <h1 class="text-5xl font-bold tracking-tight mb-6">Deploy containers to cloud servers.</h1>
    <p class="text-xl text-gray-500 max-w-2xl mx-auto mb-10">
      Granular CLI commands that hit real infrastructure.
      No state files. No manifests. Infrastructure is the source of truth.
    </p>
    <div class="flex justify-center gap-4 mb-10">
      <a href="https://docs.nvoi.to" class="px-6 py-3 bg-gray-900 text-white rounded-lg font-medium hover:bg-gray-800">Get started</a>
      <a href="https://github.com/getnvoi/nvoi" class="px-6 py-3 bg-gray-100 text-gray-700 rounded-lg font-medium hover:bg-gray-200">GitHub</a>
    </div>
    <div class="inline-flex items-center gap-3 bg-gray-50 border border-gray-200 rounded-lg px-5 py-3">
      <code class="text-sm text-gray-700 font-mono">curl -fsSL https://get.nvoi.to | sh</code>
      <button onclick="navigator.clipboard.writeText('curl -fsSL https://get.nvoi.to | sh')" class="text-gray-400 hover:text-gray-600" title="Copy">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
      </button>
    </div>
  </div>
</div>
{{end}}

{{template "layout" .}}
