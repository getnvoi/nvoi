services:
  cli:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - go-cache:/root/go
      - go-mod-cache:/root/go/pkg/mod
      - bin-cache:/app/tmp
      - ${HOME}/.ssh:/root/.ssh:ro
      - ${BUILD_SOURCE:-/dev/null}:/build-source # local build source mount
      - docker-data:/var/lib/docker # persist DinD cache across runs
    privileged: true # DinD — local builder runs docker daemon + SSH tunnel in same namespace
    env_file: .env
    environment:
      - SSH_KEY_PATH=/root/.ssh/id_rsa  # container path — host key mounted above
      - GOBIN=/app/tmp                  # container path — bin-cache volume
    working_dir: /app
    entrypoint: ["/app/bin/entrypoint"]

volumes:
  go-cache:
  go-mod-cache:
  bin-cache:
  docker-data:
