services:
  api:
    build: .
    environment:
      - MAIN_DATABASE_URL=postgres://nvoi:nvoi@postgres:5432/nvoi?sslmode=disable
      - JWT_SECRET=dev-jwt-secret-do-not-use-in-production
      - ENCRYPTION_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 2s
      timeout: 5s
      retries: 30

  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=nvoi
      - POSTGRES_PASSWORD=nvoi
      - POSTGRES_DB=nvoi
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nvoi"]
      interval: 2s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
