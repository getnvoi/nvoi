services:
  cli:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
      - go-cache:/root/go
      - go-mod-cache:/root/go/pkg/mod
      - ${HOME}/.ssh:/root/.ssh:ro
    env_file: .env
    environment:
      - NVOI_APP_NAME=${NVOI_APP_NAME:-rails}
      - NVOI_ENV=${NVOI_ENV:-production}
      - SSH_KEY_PATH=/root/.ssh/id_rsa
    working_dir: /app
    entrypoint: ["go", "run", "./cmd/cli"]

volumes:
  go-cache:
  go-mod-cache:
