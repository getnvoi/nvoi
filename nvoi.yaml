app: nvoi
env: production

providers:
  compute: hetzner
  dns: cloudflare
  storage: cloudflare
  build: local

servers:
  master:
    type: cax11
    region: nbg1
    role: master
  bugsink:
    type: cax11
    region: nbg1
    role: worker

firewall: default

volumes:
  bugsinkdata:
    size: 10
    server: bugsink

database:
  bugsink:
    kind: postgres
    image: postgres:17
    volume: bugsinkdata

storage:
  releases: {}

build:
  distribution: ./cmd/distribution

services:
  distribution:
    build: distribution
    port: 3001
    storage:
      - releases
  bugsink:
    image: bugsink/bugsink:2
    port: 8000
    health: /health/ready
    server: bugsink
    env:
      - BEHIND_HTTPS_PROXY=True
      - BASE_URL=https://monit.nvoi.to
      - ALLOWED_HOSTS=*
      - SITE_TITLE=nvoi
      - PHONEHOME=false
      - SINGLE_USER=true
      - EMAIL_HOST=smtp.gmail.com
      - EMAIL_PORT=587
      - EMAIL_USE_TLS=True
      - DEFAULT_FROM_EMAIL=nvoi <noreply@nvoi.to>
    secrets:
      - SECRET_KEY=$BUGSINK_SECRET_KEY
      - DATABASE_URL=$BUGSINK_DATABASE_URL
      - CREATE_SUPERUSER=$BUGSINK_ADMIN_EMAIL:$BUGSINK_ADMIN_PASSWORD
      - EMAIL_HOST_USER=$BUGSINK_EMAIL_HOST_USER
      - EMAIL_HOST_PASSWORD=$BUGSINK_EMAIL_HOST_PASSWORD

domains:
  distribution: [get.nvoi.to]
  bugsink: [monit.nvoi.to]
