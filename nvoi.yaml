app: nvoi
env: production

providers:
  compute: hetzner
  dns: cloudflare
  storage: cloudflare
  build: local

servers:
  master:
    type: cax11
    region: nbg1
    role: master
  bugsink:
    type: cax11
    region: nbg1
    role: worker

firewall: default

volumes:
  pgdata:
    size: 25
    server: master
  bugsinkdata:
    size: 10
    server: bugsink

database:
  main:
    kind: postgres
    image: postgres:17
    volume: pgdata
  bugsink:
    kind: postgres
    image: postgres:17
    volume: bugsinkdata

storage:
  releases: {}

build:
  web: ./cmd/web
  api: ./cmd/api
  distribution: ./cmd/distribution

services:
  api:
    build: api
    port: 8080
    secrets:
      - JWT_SECRET
      - ENCRYPTION_KEY
      - MAIN_DATABASE_URL
  web:
    build: web
    port: 3000
  distribution:
    build: distribution
    port: 3001
    storage:
      - releases
  bugsink:
    image: bugsink/bugsink:2
    port: 8000
    health: /health/ready
    server: bugsink
    env:
      - BEHIND_HTTPS_PROXY=True
      - BASE_URL=https://monit.nvoi.to
      - SITE_TITLE=nvoi
      - PHONEHOME=false
      - SINGLE_USER=true
    secrets:
      - BUGSINK_SECRET_KEY
      - SECRET_KEY=$BUGSINK_SECRET_KEY
      - BUGSINK_ADMIN_EMAIL
      - BUGSINK_ADMIN_PASSWORD
      - DATABASE_URL=$BUGSINK_DATABASE_URL
      - CREATE_SUPERUSER=$BUGSINK_ADMIN_EMAIL:$BUGSINK_ADMIN_PASSWORD

domains:
  web: [nvoi.to, www.nvoi.to]
  api: [api.nvoi.to]
  distribution: [get.nvoi.to]
  bugsink: [monit.nvoi.to]
