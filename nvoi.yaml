app: nvoi
env: production

providers:
  compute: hetzner
  dns: cloudflare
  storage: cloudflare
  build: local

servers:
  master:
    type: cax11
    region: nbg1
    role: master

firewall: default

volumes:
  pgdata:
    size: 25
    server: master

database:
  main:
    image: postgres:17
    volume: pgdata

secrets:
  - JWT_SECRET
  - ENCRYPTION_KEY

storage:
  releases: {}

build:
  web: ./cmd/web
  api: ./cmd/api
  distribution: ./cmd/distribution

services:
  api:
    build: api
    port: 8080
    secrets: [JWT_SECRET, ENCRYPTION_KEY]
  web:
    build: web
    port: 3000
  distribution:
    build: distribution
    port: 3001
    storage: [releases]

domains:
  web: [nvoi.to, www.nvoi.to]
  api: [api.nvoi.to]
  distribution: [get.nvoi.to]
