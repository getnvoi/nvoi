app: nvoi
env: production

providers:
  infra: hetzner
  dns: cloudflare
  tunnel: cloudflare
  storage: cloudflare      # required for databases.*.backup — R2 bucket provisioned implicitly
  secrets: infisical

servers:
  master:
    type: cax11
    region: nbg1
    role: master
  db-master:
    type: cax21                    # bumped: headroom for ZFS pool + DB working set
    region: nbg1
    role: worker

# No volumes block for the database — #68 mandates ZFS-LocalPV on a
# dedicated node. The postgres provider installs zfsutils-linux and
# creates a file-backed zpool on db-master during PrepareNode, and the
# OpenEBS ZFS-LocalPV CSI driver (applied cluster-side via master SSH)
# carves per-PVC datasets. `size:` below is a hard ZFS quota — writes
# past it get ENOSPC to the pod, node stays healthy. Durability =
# backups below. Moving the DB to a different node = `nvoi database
# migrate main` (see #67).

databases:
  main:
    engine: postgres
    version: "17"
    server: db-master              # dedicated — #68 forbids DB-on-master
    size: 20
    user: $MAIN_POSTGRES_USER
    password: $MAIN_POSTGRES_PASSWORD
    database: $MAIN_POSTGRES_DB
    backup:
      schedule: "0 3 * * *"        # daily at 03:00 UTC
      retention: 14                # days; applied as R2 lifecycle

services:
  api:
    image: deemx/nvoi-api         # repo-only — host inferred from registry:, tag auto-appended per deploy
    build:
      context: ./
      dockerfile: ./cmd/api/Dockerfile
    port: 8080
    databases:
      - DATABASE_URL=main         # alias DATABASE_URL_MAIN → DATABASE_URL (cmd/api reads bare DATABASE_URL)

registry:
  docker.io:
    username: $DOCKER_REGISTRY_USER
    password: $DOCKER_REGISTRY_PASSWORD

domains:
  api: [api.nvoi.to]
