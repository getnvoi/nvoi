app: nvoi
env: production

providers:
  compute: hetzner
  dns: cloudflare

servers:
  master:
    type: cax11
    region: nbg1
    role: master

firewall: default

volumes:
  pgdata:
    size: 20
    server: master

services:
  postgres:
    image: postgres:17
    port: 5432
    server: master
    replicas: 1
    volumes:
      - pgdata:/var/lib/postgresql/data
    env:
      - PGDATA=/var/lib/postgresql/data/pgdata
    secrets:
      - POSTGRES_USER=$MAIN_POSTGRES_USER
      - POSTGRES_PASSWORD=$MAIN_POSTGRES_PASSWORD
      - POSTGRES_DB=$MAIN_POSTGRES_DB

  api:
    image: docker.io/deemx/nvoi-api:latest
    port: 8080
    depends_on: [postgres]
    secrets:
      - DATABASE_URL=postgresql://$MAIN_POSTGRES_USER:$MAIN_POSTGRES_PASSWORD@postgres:5432/$MAIN_POSTGRES_DB?sslmode=disable

domains:
  api: [api.nvoi.to]
