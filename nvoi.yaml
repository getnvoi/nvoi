app: nvoi
env: production

providers:
  infra: hetzner
  dns: cloudflare
  tunnel: cloudflare
  storage: cloudflare      # required for databases.*.backup — R2 bucket provisioned implicitly
  secrets: infisical

servers:
  master:
    type: cax11
    region: nbg1
    role: master

# No volumes block for the database — managed databases pin data to the
# node's local NVMe via k3s local-path. Network-attached volumes
# (Hetzner Block Volume) are ~10x slower and the wrong substrate for a
# primary DB. Durability is handled by databases.main.backup below.
# Moving the DB to a different server is blocked by reconcile (#67).

databases:
  main:
    engine: postgres
    version: "17"
    server: master
    size: 20
    user: $MAIN_POSTGRES_USER
    password: $MAIN_POSTGRES_PASSWORD
    database: $MAIN_POSTGRES_DB
    backup:
      schedule: "0 3 * * *"        # daily at 03:00 UTC
      retention: 14                # days; applied as R2 lifecycle

services:
  api:
    image: deemx/nvoi-api         # repo-only — host inferred from registry:, tag auto-appended per deploy
    build:
      context: ./
      dockerfile: ./cmd/api/Dockerfile
    port: 8080
    databases:
      - DATABASE_URL=main         # alias DATABASE_URL_MAIN → DATABASE_URL (cmd/api reads bare DATABASE_URL)

registry:
  docker.io:
    username: $DOCKER_REGISTRY_USER
    password: $DOCKER_REGISTRY_PASSWORD

domains:
  api: [api.nvoi.to]
